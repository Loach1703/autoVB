[build-system]
requires = ["setuptools"]
build-backend = "setuptools.build_meta"

[project]
name = "autoVB"
version = "0.1.0"
description = "A generator of XMVB input file: AutoVB tools"
requires-python = ">=3.8"
dependencies = [
    "numpy",
    "pyscf",
    "mokit"
]

[project.scripts]
# 左边是终端中的命令名称，右边是 包名.模块名:函数名
autovb-nbo = "autoVB.cli:autovb_nbo"
autovb-xmi = "autoVB.cli:autovb_xmi"